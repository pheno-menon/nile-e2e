name: Nile end-to-end tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run (smoke | regression | security)'
        required: false
        default: 'regression'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nile-e2e
        uses: actions/checkout@v4

      - name: Checkout Nile application
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/nile
          path: nile-app

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-e2e-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-e2e-

      - name: Build Nile JAR
        working-directory: nile-app
        run: mvn clean package -DskipTests

      - name: Start Nile docker stack
        working-directory: nile-app
        run: |
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          docker compose up -d --build
          echo "Docker stack started"

      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for API to be ready.."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/api/products; then
              echo "Stack is healthy after $i attempts"
              exit 0
            fi
            echo "Attempt $i - not ready yet, waiting 5s .."
            sleep 5
          done
          echo "Stack failed to become healthy in time"
          docker compose -f nile-app/docker-compose.yml logs
          exit 1

      - name: Run E2E tests
        run: |
          mvn verify -Dsuite=${{ github.event.inputs.suite || 'regression' }}

      - name: Upload TestNG HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-report
          path: target/failsafe-reports/

      - name: Teardown docker stack
        if: always()
        working-directory: nile-app
        run: docker compose down -v
